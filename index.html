<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UX Experiment</title>
    <style>
        body { font-family: sans-serif; padding: 40px; text-align: center; background: #f4f6f9; }
        .box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); max-width: 500px; margin: 0 auto; }
        button { padding: 10px 20px; font-weight: bold; border: none; border-radius: 6px; background: #2563eb; color: white; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>실험용 웹사이트 배포 테스트</h2>
        <p>이 화면이 정상적으로 보인다면 깃허브 배포 시스템과 파일 경로에는 아무런 문제가 없는 것입니다.</p>
        <button onclick="alert('정상 작동합니다!')">작동 테스트</button>
    </div>
</body>
</html>
